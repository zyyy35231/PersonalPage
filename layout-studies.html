<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zy Layout Studies</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #181614;
      --muted: #777168;
      --line: rgba(24, 22, 20, 0.14);
      --page-pad: clamp(16px, 3.8vw, 52px);
      --font-display: "Iowan Old Style", "Charter", Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 12px var(--page-pad);
      border-bottom: 1px solid var(--line);
      background: rgba(244, 241, 234, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;
    }

    .nav {
      justify-self: center;
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .nav a {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border-bottom: 1px solid transparent;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--ink);
      border-color: currentColor;
      outline: none;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section {
      min-height: 100svh;
      padding: clamp(34px, 5vw, 72px) var(--page-pad);
      border-top: 1px solid var(--line);
    }

    .section:first-of-type { border-top: 0; }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: clamp(18px, 3vw, 36px);
    }

    .section-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(40px, 7vw, 92px);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .section-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--tone);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.16), 0 0 0 2px rgba(244, 241, 234, 0.84);
    }

    .photo {
      position: relative;
      overflow: hidden;
      background: #d6d0c6;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo::after {
      content: "";
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--tone);
      box-shadow: 0 0 0 2px rgba(244, 241, 234, 0.86), inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .river {
      display: grid;
      gap: clamp(12px, 1.8vw, 24px);
    }

    .river-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: clamp(12px, 2vw, 28px);
      align-items: center;
      min-height: clamp(120px, 18vw, 230px);
    }

    .river-row:nth-child(even) {
      grid-template-columns: 1fr 80px;
    }

    .river-row:nth-child(even) .river-color {
      order: 2;
      justify-self: end;
    }

    .river-color {
      width: clamp(48px, 6vw, 84px);
      height: clamp(48px, 6vw, 84px);
      border-radius: 50%;
      background: var(--tone);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .river-strip {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: clamp(8px, 1vw, 14px);
      align-items: center;
    }

    .river .photo {
      grid-column: span 3;
      height: clamp(120px, 14vw, 190px);
    }

    .river .photo:nth-child(3n + 1) {
      grid-column: span 4;
      height: clamp(150px, 18vw, 250px);
    }

    .river .photo:nth-child(5n) {
      grid-column: span 2;
      height: clamp(100px, 11vw, 150px);
    }

    .book {
      display: grid;
      gap: clamp(42px, 7vw, 96px);
    }

    .spread {
      min-height: clamp(560px, 72vw, 920px);
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-template-rows: repeat(8, minmax(42px, 1fr));
      gap: clamp(10px, 1.5vw, 20px);
      padding: clamp(16px, 3vw, 42px);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .book .photo:nth-child(6n + 1) { grid-column: 1 / span 5; grid-row: 1 / span 5; }
    .book .photo:nth-child(6n + 2) { grid-column: 8 / span 4; grid-row: 2 / span 3; }
    .book .photo:nth-child(6n + 3) { grid-column: 6 / span 2; grid-row: 5 / span 2; }
    .book .photo:nth-child(6n + 4) { grid-column: 2 / span 3; grid-row: 6 / span 3; }
    .book .photo:nth-child(6n + 5) { grid-column: 9 / span 3; grid-row: 6 / span 2; }
    .book .photo:nth-child(6n) { grid-column: 6 / span 2; grid-row: 2 / span 2; }

    .wall {
      display: grid;
      gap: clamp(44px, 7vw, 92px);
    }

    .wall-group {
      display: grid;
      grid-template-columns: clamp(26px, 4vw, 58px) minmax(0, 1fr);
      gap: clamp(18px, 3vw, 46px);
      align-items: start;
      min-height: clamp(360px, 52vw, 720px);
    }

    .wall-rail {
      position: sticky;
      top: 74px;
      min-height: clamp(240px, 42vw, 520px);
      background: var(--tone);
    }

    .wall-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-auto-rows: 18px;
      gap: clamp(9px, 1.2vw, 16px);
    }

    .wall .photo {
      grid-column: span 3;
      grid-row: span 13;
    }

    .wall .photo:nth-child(4n + 1) {
      grid-column: span 5;
      grid-row: span 17;
    }

    .wall .photo:nth-child(4n + 2) {
      grid-column: span 2;
      grid-row: span 10;
    }

    .wall .photo:nth-child(5n) {
      grid-column: span 4;
      grid-row: span 14;
    }

    @media (max-width: 820px) {
      .site-header {
        grid-template-columns: auto auto;
      }

      .nav {
        justify-self: end;
        gap: 12px;
      }

      .count { display: none; }

      .section-head {
        align-items: start;
        flex-direction: column;
      }

      .section-note {
        text-align: left;
      }

      .river-row,
      .river-row:nth-child(even) {
        grid-template-columns: 1fr;
      }

      .river-row:nth-child(even) .river-color {
        order: initial;
        justify-self: start;
      }

      .river-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .river .photo,
      .river .photo:nth-child(3n + 1),
      .river .photo:nth-child(5n) {
        grid-column: span 2;
      }

      .spread {
        min-height: auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: none;
      }

      .book .photo,
      .book .photo:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
        aspect-ratio: 4 / 5;
      }

      .book .photo:nth-child(3n) {
        grid-column: span 2;
        aspect-ratio: 1.5 / 1;
      }

      .wall-group {
        grid-template-columns: 1fr;
      }

      .wall-rail {
        position: static;
        width: 100%;
        min-height: 16px;
      }

      .wall-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .wall .photo,
      .wall .photo:nth-child(4n + 1),
      .wall .photo:nth-child(4n + 2),
      .wall .photo:nth-child(5n) {
        grid-column: span 2;
        grid-row: span 13;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Zy</a>
    <nav class="nav" aria-label="版式导航">
      <a href="#river">1</a>
      <a href="#book">2</a>
      <a href="#wall">4</a>
    </nav>
    <div class="count" id="count">0 works</div>
  </header>

  <main>
    <section class="section" id="river">
      <div class="section-head">
        <h1 class="section-title">1</h1>
        <p class="section-note">Color river</p>
      </div>
      <div class="river" id="riverGrid"></div>
    </section>

    <section class="section" id="book">
      <div class="section-head">
        <h2 class="section-title">2</h2>
        <p class="section-note">Loose pages</p>
      </div>
      <div class="book" id="bookGrid"></div>
    </section>

    <section class="section" id="wall">
      <div class="section-head">
        <h2 class="section-title">4</h2>
        <p class="section-note">Vertical wall</p>
      </div>
      <div class="wall" id="wallGrid"></div>
    </section>
  </main>

  <script src="assets/photo-data.js"></script>
  <script>
    const photos = Array.isArray(window.ZY_PHOTOS) ? window.ZY_PHOTOS : [];
    const riverGrid = document.getElementById("riverGrid");
    const bookGrid = document.getElementById("bookGrid");
    const wallGrid = document.getElementById("wallGrid");
    const count = document.getElementById("count");

    function photoColor(photo) {
      return photo.color || "#9a9287";
    }

    function hexToRgb(hex) {
      const normalized = String(hex || "").replace("#", "");
      if (!/^[0-9a-f]{6}$/i.test(normalized)) {
        return { r: 154, g: 146, b: 135 };
      }
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0")).join("")}`;
    }

    function colorDistance(a, b) {
      const dr = a.r - b.r;
      const dg = a.g - b.g;
      const db = a.b - b.b;
      return Math.sqrt(dr * dr * 0.9 + dg * dg * 1.15 + db * db);
    }

    function mixColor(group, rgb) {
      const nextCount = group.count + 1;
      group.rgb = {
        r: (group.rgb.r * group.count + rgb.r) / nextCount,
        g: (group.rgb.g * group.count + rgb.g) / nextCount,
        b: (group.rgb.b * group.count + rgb.b) / nextCount
      };
      group.color = rgbToHex(group.rgb);
      group.count = nextCount;
    }

    function hue(photo) {
      const { r, g, b } = hexToRgb(photoColor(photo));
      const max = Math.max(r, g, b) / 255;
      const min = Math.min(r, g, b) / 255;
      if (max === min) {
        return 0;
      }
      const red = r / 255;
      const green = g / 255;
      const blue = b / 255;
      let value = 0;
      if (max === red) value = (green - blue) / (max - min);
      if (max === green) value = 2 + (blue - red) / (max - min);
      if (max === blue) value = 4 + (red - green) / (max - min);
      return (value * 60 + 360) % 360;
    }

    function luminance(photo) {
      const { r, g, b } = hexToRgb(photoColor(photo));
      return (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
    }

    function buildColorGroups(items) {
      const groups = [];
      items.forEach((photo) => {
        const rgb = hexToRgb(photoColor(photo));
        let bestGroup = null;
        let bestDistance = Infinity;
        groups.forEach((group) => {
          const distance = colorDistance(rgb, group.rgb);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestGroup = group;
          }
        });
        if (!bestGroup || bestDistance > 72) {
          groups.push({ id: `color-${groups.length + 1}`, color: rgbToHex(rgb), rgb, count: 1, photos: [photo] });
          return;
        }
        bestGroup.photos.push(photo);
        mixColor(bestGroup, rgb);
      });

      while (groups.length > 9) {
        let pair = [0, 1];
        let bestDistance = Infinity;
        for (let index = 0; index < groups.length; index += 1) {
          for (let next = index + 1; next < groups.length; next += 1) {
            const distance = colorDistance(groups[index].rgb, groups[next].rgb);
            if (distance < bestDistance) {
              bestDistance = distance;
              pair = [index, next];
            }
          }
        }
        const [first, second] = pair;
        const target = groups[first];
        const merged = groups.splice(second, 1)[0];
        merged.photos.forEach((photo) => {
          target.photos.push(photo);
          mixColor(target, hexToRgb(photoColor(photo)));
        });
      }

      return groups.sort((a, b) => hue(a.photos[0]) - hue(b.photos[0]));
    }

    function photoMarkup(photo) {
      return `
        <a class="photo" href="${photo.image}" style="--tone: ${photoColor(photo)}" aria-label="${photo.year || "photo"}">
          <img src="${photo.thumb || photo.image}" alt="${photo.alt}" loading="lazy" />
        </a>
      `;
    }

    function chunk(items, size) {
      const chunks = [];
      for (let index = 0; index < items.length; index += size) {
        chunks.push(items.slice(index, index + size));
      }
      return chunks;
    }

    const sortedByColor = [...photos].sort((a, b) => hue(a) - hue(b) || luminance(a) - luminance(b));
    const groups = buildColorGroups(photos);

    riverGrid.innerHTML = groups.map((group) => `
      <div class="river-row" style="--tone: ${group.color}">
        <div class="river-color"></div>
        <div class="river-strip">
          ${group.photos.sort((a, b) => luminance(a) - luminance(b)).map(photoMarkup).join("")}
        </div>
      </div>
    `).join("");

    bookGrid.innerHTML = chunk(sortedByColor, 6).map((spread) => `
      <div class="spread">
        ${spread.map(photoMarkup).join("")}
      </div>
    `).join("");

    wallGrid.innerHTML = groups.map((group) => `
      <div class="wall-group" style="--tone: ${group.color}">
        <div class="wall-rail"></div>
        <div class="wall-grid">
          ${group.photos.map(photoMarkup).join("")}
        </div>
      </div>
    `).join("");

    count.textContent = `${photos.length} works`;
  </script>
</body>
</html>
