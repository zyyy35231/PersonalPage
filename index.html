<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zy Photography</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #181614;
      --muted: #777168;
      --line: rgba(24, 22, 20, 0.14);
      --surface: rgba(244, 241, 234, 0.88);
      --page-pad: clamp(16px, 3.8vw, 52px);
      --font-display: "Iowan Old Style", "Charter", Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body.lightbox-open { overflow: hidden; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { color: inherit; font: inherit; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 12px var(--page-pad);
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .nav {
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .nav a {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border-bottom: 1px solid transparent;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--ink);
      border-color: currentColor;
      outline: none;
    }

    .header-count {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .works {
      padding: clamp(22px, 4vw, 54px) var(--page-pad) clamp(56px, 8vw, 118px);
    }

    .color-strip {
      display: flex;
      gap: 7px;
      align-items: center;
      min-height: 16px;
      margin-bottom: clamp(34px, 5vw, 72px);
      overflow: hidden;
    }

    .strip-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--tone);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
      flex: 0 0 auto;
    }

    .wall {
      display: grid;
      gap: clamp(46px, 8vw, 112px);
    }

    .wall-group {
      display: grid;
      grid-template-columns: clamp(24px, 4vw, 58px) minmax(0, 1fr);
      gap: clamp(18px, 3.2vw, 48px);
      align-items: start;
      min-height: clamp(360px, 52vw, 720px);
    }

    .wall-rail {
      position: sticky;
      top: 82px;
      min-height: clamp(240px, 42vw, 520px);
      background: var(--tone);
    }

    .wall-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-auto-rows: 18px;
      gap: clamp(9px, 1.2vw, 16px);
    }

    .photo-button {
      position: relative;
      grid-column: span 3;
      grid-row: span 13;
      min-height: 0;
      border: 0;
      padding: 0;
      overflow: hidden;
      background: #d6d0c6;
      cursor: pointer;
    }

    .photo-button[data-shape="large"] {
      grid-column: span 5;
      grid-row: span 17;
    }

    .photo-button[data-shape="small"] {
      grid-column: span 2;
      grid-row: span 10;
    }

    .photo-button[data-shape="wide"] {
      grid-column: span 4;
      grid-row: span 12;
    }

    .photo-button[data-shape="tall"] {
      grid-column: span 3;
      grid-row: span 18;
    }

    .photo-button[data-shape="panorama"] {
      grid-column: span 6;
      grid-row: span 10;
    }

    .photo-button::after {
      content: "";
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--tone);
      box-shadow: 0 0 0 2px rgba(244, 241, 234, 0.86), inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .photo-button:hover img,
    .photo-button:focus-visible img {
      transform: scale(1.025);
      filter: saturate(0.95);
    }

    .photo-button:focus-visible {
      outline: 2px solid var(--tone);
      outline-offset: 4px;
    }

    .photo-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 420ms ease, filter 420ms ease;
    }

    .section {
      padding: clamp(34px, 5vw, 72px) var(--page-pad);
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: clamp(18px, 2.4vw, 28px);
    }

    .section-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .info {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .info-item {
      min-height: 128px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.42);
    }

    .info-item b {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 400;
      line-height: 1;
    }

    .info-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 18px var(--page-pad) 28px;
      color: var(--muted);
      font-size: 12px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      background: rgba(5, 6, 7, 0.96);
      color: white;
    }

    .lightbox[hidden] { display: none; }

    .lightbox-media {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(14px, 2.4vw, 32px);
    }

    .lightbox-image {
      width: 100%;
      height: 100%;
      max-height: calc(100svh - 88px);
      object-fit: contain;
    }

    .lightbox-bar {
      position: fixed;
      left: clamp(14px, 2.4vw, 32px);
      right: clamp(14px, 2.4vw, 32px);
      bottom: clamp(12px, 2vw, 24px);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      color: rgba(255, 255, 255, 0.72);
      pointer-events: none;
    }

    .lightbox-meta {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-self: start;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(8, 9, 10, 0.66);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font-size: 12px;
      pointer-events: auto;
    }

    .lightbox-swatch {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--tone);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
    }

    .lightbox-count {
      justify-self: center;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lightbox-controls {
      justify-self: end;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: rgba(8, 9, 10, 0.62);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: rgba(255, 255, 255, 0.42);
      outline: none;
    }

    .icon-button[disabled] {
      opacity: 0.34;
      cursor: default;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 920px) {
      .wall-group {
        grid-template-columns: clamp(18px, 4vw, 34px) minmax(0, 1fr);
      }

      .wall-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .photo-button,
      .photo-button[data-shape="large"],
      .photo-button[data-shape="tall"] {
        grid-column: span 3;
      }

      .photo-button[data-shape="wide"],
      .photo-button[data-shape="panorama"] {
        grid-column: span 6;
      }
    }

    @media (max-width: 640px) {
      .site-header {
        grid-template-columns: auto auto;
      }

      .nav {
        justify-self: end;
        gap: 12px;
      }

      .header-count { display: none; }

      .works {
        padding-top: 16px;
      }

      .wall {
        gap: clamp(34px, 10vw, 58px);
      }

      .wall-group {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .wall-rail {
        position: static;
        width: 100%;
        min-height: 16px;
      }

      .wall-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-auto-rows: 16px;
      }

      .photo-button,
      .photo-button[data-shape="large"],
      .photo-button[data-shape="small"],
      .photo-button[data-shape="wide"],
      .photo-button[data-shape="tall"],
      .photo-button[data-shape="panorama"] {
        grid-column: span 2;
        grid-row: span 13;
      }

      .photo-button[data-shape="wide"],
      .photo-button[data-shape="panorama"] {
        grid-column: span 4;
        grid-row: span 12;
      }

      .section-head,
      .footer {
        align-items: start;
        flex-direction: column;
      }

      .info {
        grid-template-columns: 1fr;
      }

      .lightbox-bar {
        grid-template-columns: 1fr auto;
      }

      .lightbox-count {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#works" aria-label="回到作品">Zy</a>
    <nav class="nav" aria-label="站点导航">
      <a href="#works">Works</a>
      <a href="#info">Info</a>
    </nav>
    <div class="header-count" id="headerCount">0 works</div>
  </header>

  <main>
    <section class="works" id="works" aria-label="Works">
      <h1 class="sr-only">Works</h1>
      <div class="color-strip" id="colorStrip" aria-label="作品颜色索引"></div>
      <div class="wall" id="workWall"></div>
    </section>

    <section class="section" id="info">
      <div class="section-head">
        <h2 class="section-title">Info</h2>
      </div>
      <div class="info">
        <div class="info-item">
          <b>Local</b>
          <span>原图留在本机，只发布压缩展示图。</span>
        </div>
        <div class="info-item">
          <b>Draft</b>
          <span>选片台记录入选、备选、色彩和备注。</span>
        </div>
        <div class="info-item">
          <b>Color</b>
          <span>颜色来自照片，也作为唯一入口。</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>Zy Photography</span>
    <span id="footerCount">0 works</span>
  </footer>

  <div class="lightbox" id="lightbox" hidden aria-hidden="true">
    <div class="lightbox-media">
      <img class="lightbox-image" id="lightboxImage" src="" alt="" />
    </div>
    <div class="lightbox-bar" role="dialog" aria-modal="true" aria-label="照片查看">
      <div class="lightbox-meta" id="lightboxMeta"></div>
      <div class="lightbox-count" id="lightboxCount">1 / 1</div>
      <div class="lightbox-controls" aria-label="完整查看导航">
        <button class="icon-button" id="lightboxPrev" type="button" aria-label="上一张">‹</button>
        <button class="icon-button" id="lightboxNext" type="button" aria-label="下一张">›</button>
        <button class="icon-button" id="lightboxClose" type="button" aria-label="关闭">×</button>
      </div>
    </div>
  </div>

  <script src="assets/photo-data.js"></script>
  <script>
    const photos = Array.isArray(window.ZY_PHOTOS) ? window.ZY_PHOTOS : [];
    const fallbackColor = "#9a9287";

    const colorStrip = document.getElementById("colorStrip");
    const workWall = document.getElementById("workWall");
    const headerCount = document.getElementById("headerCount");
    const footerCount = document.getElementById("footerCount");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxMeta = document.getElementById("lightboxMeta");
    const lightboxCount = document.getElementById("lightboxCount");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxPrev = document.getElementById("lightboxPrev");
    const lightboxNext = document.getElementById("lightboxNext");

    let lightboxIndex = -1;
    let lightboxReturnFocus = null;

    function photoColor(photo) {
      return photo.color || fallbackColor;
    }

    function hexToRgb(hex) {
      const normalized = String(hex || "").replace("#", "");
      if (!/^[0-9a-f]{6}$/i.test(normalized)) {
        return { r: 154, g: 146, b: 135 };
      }
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0")).join("")}`;
    }

    function colorDistance(a, b) {
      const dr = a.r - b.r;
      const dg = a.g - b.g;
      const db = a.b - b.b;
      return Math.sqrt(dr * dr * 0.9 + dg * dg * 1.15 + db * db);
    }

    function mixColor(group, rgb) {
      const nextCount = group.count + 1;
      group.rgb = {
        r: (group.rgb.r * group.count + rgb.r) / nextCount,
        g: (group.rgb.g * group.count + rgb.g) / nextCount,
        b: (group.rgb.b * group.count + rgb.b) / nextCount
      };
      group.color = rgbToHex(group.rgb);
      group.count = nextCount;
    }

    function hueFromColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const red = r / 255;
      const green = g / 255;
      const blue = b / 255;
      const max = Math.max(red, green, blue);
      const min = Math.min(red, green, blue);
      if (max === min) {
        return 0;
      }
      let value = 0;
      if (max === red) value = (green - blue) / (max - min);
      if (max === green) value = 2 + (blue - red) / (max - min);
      if (max === blue) value = 4 + (red - green) / (max - min);
      return (value * 60 + 360) % 360;
    }

    function luminance(photo) {
      const { r, g, b } = hexToRgb(photoColor(photo));
      return (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
    }

    function buildColorGroups(items) {
      const groups = [];
      items.forEach((photo) => {
        const rgb = hexToRgb(photoColor(photo));
        let bestGroup = null;
        let bestDistance = Infinity;
        groups.forEach((group) => {
          const distance = colorDistance(rgb, group.rgb);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestGroup = group;
          }
        });
        if (!bestGroup || bestDistance > 72) {
          groups.push({
            id: `color-${groups.length + 1}`,
            color: rgbToHex(rgb),
            rgb,
            count: 1,
            photos: [photo]
          });
          return;
        }
        bestGroup.photos.push(photo);
        mixColor(bestGroup, rgb);
      });

      while (groups.length > 9) {
        let pair = [0, 1];
        let bestDistance = Infinity;
        for (let index = 0; index < groups.length; index += 1) {
          for (let next = index + 1; next < groups.length; next += 1) {
            const distance = colorDistance(groups[index].rgb, groups[next].rgb);
            if (distance < bestDistance) {
              bestDistance = distance;
              pair = [index, next];
            }
          }
        }
        const [first, second] = pair;
        const target = groups[first];
        const merged = groups.splice(second, 1)[0];
        merged.photos.forEach((photo) => {
          target.photos.push(photo);
          mixColor(target, hexToRgb(photoColor(photo)));
        });
      }

      return groups
        .sort((a, b) => hueFromColor(a.color) - hueFromColor(b.color))
        .map((group, index) => ({ ...group, id: `color-${index + 1}` }));
    }

    const colorGroups = buildColorGroups(photos);

    function lightboxInfo(photo) {
      return [photo.year, photo.cameraMeta].filter(Boolean).join(" · ");
    }

    function photoShape(photo, index) {
      if (photo.orientation === "panorama") {
        return "panorama";
      }
      if (photo.orientation === "portrait") {
        return index % 4 === 1 ? "small" : "tall";
      }
      if (photo.orientation === "square") {
        return index % 3 === 0 ? "small" : "large";
      }
      if (index % 5 === 0) return "large";
      if (index % 4 === 0) return "wide";
      if (index % 4 === 1) return "small";
      return "medium";
    }

    function renderColorStrip() {
      colorStrip.innerHTML = colorGroups.map((group) => `
        <span class="strip-dot" style="--tone: ${group.color}" title="${group.photos.length} works"></span>
      `).join("");
    }

    function renderWall() {
      workWall.innerHTML = colorGroups.map((group) => `
        <section class="wall-group" style="--tone: ${group.color}" aria-label="${group.photos.length} works">
          <div class="wall-rail" aria-hidden="true"></div>
          <div class="wall-grid">
            ${group.photos.sort((a, b) => luminance(a) - luminance(b)).map((photo, index) => `
              <button class="photo-button" type="button" data-work="${photo.id}" data-shape="${photoShape(photo, index)}" style="--tone: ${photoColor(photo)}" aria-label="查看照片，${lightboxInfo(photo) || photo.year || "color"}">
                <img src="${photo.thumb || photo.image}" alt="${photo.alt}" loading="lazy" />
              </button>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderLightbox() {
      const photo = photos[lightboxIndex];
      if (!photo) {
        return;
      }
      lightboxImage.src = photo.image;
      lightboxImage.alt = photo.alt;
      lightboxMeta.style.setProperty("--tone", photoColor(photo));
      lightboxMeta.innerHTML = `
        <span class="lightbox-swatch" aria-label="照片代表色"></span>
        <span>${lightboxInfo(photo) || photo.year || "color"}</span>
      `;
      lightboxCount.textContent = `${lightboxIndex + 1} / ${photos.length}`;
      lightboxPrev.disabled = lightboxIndex <= 0;
      lightboxNext.disabled = lightboxIndex >= photos.length - 1;
    }

    function openLightbox(id, trigger) {
      const index = photos.findIndex((photo) => photo.id === id);
      if (index === -1) {
        return;
      }
      lightboxIndex = index;
      lightboxReturnFocus = trigger || document.activeElement;
      renderLightbox();
      lightbox.hidden = false;
      lightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("lightbox-open");
      lightboxClose.focus({ preventScroll: true });
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightbox.setAttribute("aria-hidden", "true");
      document.body.classList.remove("lightbox-open");
      lightboxIndex = -1;
      if (lightboxReturnFocus && typeof lightboxReturnFocus.focus === "function") {
        lightboxReturnFocus.focus({ preventScroll: true });
      }
    }

    function stepLightbox(direction) {
      const nextIndex = lightboxIndex + direction;
      if (nextIndex < 0 || nextIndex >= photos.length) {
        return;
      }
      lightboxIndex = nextIndex;
      renderLightbox();
    }

    document.addEventListener("click", (event) => {
      const target = event.target instanceof Element ? event.target : null;
      if (!target) {
        return;
      }

      const workTarget = target.closest("[data-work]");
      const anchorTarget = target.closest('a[href^="#"]');

      if (workTarget) {
        openLightbox(workTarget.dataset.work, workTarget);
        return;
      }

      if (anchorTarget) {
        const id = anchorTarget.getAttribute("href");
        const section = id ? document.querySelector(id) : null;
        if (section) {
          event.preventDefault();
          const offset = section.getBoundingClientRect().top + window.pageYOffset - 58;
          window.scrollTo({ top: offset, behavior: "smooth" });
        }
      }
    });

    document.addEventListener("keydown", (event) => {
      if (lightbox.hidden) {
        return;
      }
      if (event.key === "Escape") {
        event.preventDefault();
        closeLightbox();
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        stepLightbox(-1);
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        stepLightbox(1);
      }
    });

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox || event.target === lightboxImage) {
        closeLightbox();
      }
    });

    lightboxClose.addEventListener("click", closeLightbox);
    lightboxPrev.addEventListener("click", () => stepLightbox(-1));
    lightboxNext.addEventListener("click", () => stepLightbox(1));

    renderColorStrip();
    renderWall();
    headerCount.textContent = `${photos.length} works`;
    footerCount.textContent = `${photos.length} works`;
  </script>
</body>
</html>
